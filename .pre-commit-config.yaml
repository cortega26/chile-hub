repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        pass_filenames: false
        additional_dependencies: [polars>=1.41.2, requests>=2.34.2, tenacity>=9.1.4]

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: uv run pip-audit
        language: system
        pass_filenames: false
        files: ^pyproject\.toml$
      - id: interrogate
        name: interrogate
        entry: uv run interrogate
        language: system
        pass_filenames: false
        files: ^src/chile_hub/
      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml -r src/
        language: system
        pass_filenames: false
        files: ^src/
