repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        # Commit hooks must not rewrite partially staged files. Run
        # `pre-commit run --all-files` after `ruff check --fix` when fixing locally.
      - id: ruff-format
        args: [--check]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^data/normalized/
      - id: end-of-file-fixer
        exclude: ^data/normalized/
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: ^data/normalized/
      - id: check-json
