name: TestPyPI Package Smoke

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-testpypi:
    name: Build, publish to TestPyPI, and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Build package
        id: build-package
        run: |
          uv build
          uvx twine check dist/*
          version="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Smoke test TestPyPI install
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install --upgrade pip
          .venv-smoke/bin/python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "chile-hub==${{ steps.build-package.outputs.version }}"
          .venv-smoke/bin/python -c "from chile_hub import ChileHub; print(ChileHub.__name__)"
          .venv-smoke/bin/chile-hub --help
