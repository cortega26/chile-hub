name: Monthly Scrape (SINIM + CEAD)

on:
  schedule:
    # Día 1 de cada mes, 03:00 UTC (23:00 CLT / 00:00 CLST)
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Año a extraer (default: año actual)"
        required: false
        type: string

permissions:
  contents: write  # Para commit automático de datos actualizados

env:
  PYTHON_VERSION: "3.13"

concurrency:
  group: monthly-scrape
  cancel-in-progress: false

jobs:
  scrape-sinim:
    name: SINIM Finanzas Municipales
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv lock --locked
          uv sync --extra pipeline --extra dev
          uv run playwright install chromium

      - name: Extract SINIM finanzas municipales
        id: scrape
        continue-on-error: true
        run: |
          uv run python src/extractors/sinim_finanzas_live_extractor.py
        env:
          SCRAPE_YEAR: ${{ inputs.year || '2024' }}

      - name: Report scrape failure (non-blocking)
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "⚠️ SINIM scrape falló — se mantiene el último snapshot bueno."
          echo "El build diario no se ve afectado."
          echo "Revisar manualmente: https://datos.sinim.gov.cl/datos_municipales.php"
          # No hacemos exit 1 — el workflow sigue siendo verde

      - name: Rebuild with updated finanzas
        if: steps.scrape.outcome == 'success'
        run: |
          uv run python -c "
          import sys; sys.path.insert(0, 'src')
          from extractors.sinim_finanzas_live_extractor import process_sinim_finanzas
          process_sinim_finanzas()
          "
          uv run make build

      - name: Commit updated data (if changed)
        if: steps.scrape.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/staging/finanzas_municipales.csv
          git add data/staging/finanzas_municipales.metadata.json
          git add data/raw/sinim_finanzas_municipales_*.xlsx
          git add data/normalized/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): monthly SINIM scrape refresh [skip ci]"
            git push
          fi

      - name: Summary
        run: |
          echo "## Monthly SINIM Scrape — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.scrape.outcome }}" = "success" ]; then
            echo "✅ Scrape exitoso" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Scrape falló — usando último snapshot bueno" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Requiere intervención manual: revisar portal SINIM" >> $GITHUB_STEP_SUMMARY
          fi

  scrape-cead:
    name: CEAD Delincuencia Comunal
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv lock --locked
          uv sync --extra pipeline --extra dev

      - name: Extract CEAD delincuencia comunal
        id: scrape
        continue-on-error: true
        run: |
          uv run python src/extractors/cead_delincuencia_live_extractor.py --year ${{ inputs.year || '2024' }}
        env:
          SCRAPE_YEAR: ${{ inputs.year || '2024' }}

      - name: Report scrape failure (non-blocking)
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "⚠️ CEAD scrape falló — se mantiene el último snapshot bueno."
          echo "El build diario no se ve afectado."
          echo "Carril CANDIDATE — fuera del bundle público."
          echo "Revisar manualmente: https://cead.minsegpublica.gob.cl/estadisticas-delictuales/"
          # No hacemos exit 1 — el workflow sigue siendo verde

      - name: Commit updated data (if changed)
        if: steps.scrape.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/staging/delincuencia_comunal.csv
          git add data/staging/delincuencia_comunal.metadata.json
          git add data/raw/cead_delincuencia_*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): monthly CEAD delincuencia scrape refresh [skip ci]"
            git push
          fi

      - name: Summary
        run: |
          echo "## Monthly CEAD Scrape — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.scrape.outcome }}" = "success" ]; then
            echo "✅ Scrape exitoso" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Scrape falló — usando último snapshot bueno" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Carril CANDIDATE — fuera del bundle público" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Requiere intervención manual: revisar portal CEAD" >> $GITHUB_STEP_SUMMARY
          fi
