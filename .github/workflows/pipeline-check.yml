name: Pipeline Check

on:
  push:
  pull_request:
  schedule:
    - cron: "0 10 * * *"  # 06:00 CLT (UTC-4) todos los días

jobs:
  verify-pipeline:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          python -m ruff check src/ tests/ scripts/
          python -m ruff format --check src/ tests/ scripts/

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Chromium for landing verification
        run: python -m playwright install --with-deps chromium

      - name: Run extractors
        run: |
          python src/extractors/subdere_extractor.py
          python src/extractors/bcentral_extractor.py

      - name: Build outputs
        run: python src/build_dev_db.py

      - name: Verify pipeline artifacts
        run: python scripts/verify_pipeline.py

      - name: Run hub smoke tests
        run: python -m unittest discover -s tests

      - name: Run landing smoke verification
        run: python scripts/verify_landing.py

      - name: Generate pipeline status
        run: python scripts/pipeline_status.py

      - name: Publish job summary
        run: |
          printf "## Quick Status Entry Points\n\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- \`data/normalized/hub_status.json\`: compact status for polling, dashboards and CI checks.\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- \`data/normalized/hub_health.json\`: aggregated health report with per-dataset breakdown.\n" >> "$GITHUB_STEP_SUMMARY"
          printf -- "- \`data/normalized/hub_bundle.json\`: consolidated machine-readable index of datasets, reports and artifacts.\n\n" >> "$GITHUB_STEP_SUMMARY"
          cat data/normalized/overview.md >> "$GITHUB_STEP_SUMMARY"
          printf "\n\n" >> "$GITHUB_STEP_SUMMARY"
          cat data/normalized/hub_health.md >> "$GITHUB_STEP_SUMMARY"
          printf "\n\n" >> "$GITHUB_STEP_SUMMARY"
          cat data/normalized/redistribution_report.md >> "$GITHUB_STEP_SUMMARY"
          printf "\n\n" >> "$GITHUB_STEP_SUMMARY"
          cat data/normalized/provenance_report.md >> "$GITHUB_STEP_SUMMARY"
          printf "\n\n" >> "$GITHUB_STEP_SUMMARY"
          cat data/normalized/drift_report.md >> "$GITHUB_STEP_SUMMARY"
          printf "\n\n" >> "$GITHUB_STEP_SUMMARY"
          cat data/normalized/pipeline_status.md >> "$GITHUB_STEP_SUMMARY"
          printf "\n\n" >> "$GITHUB_STEP_SUMMARY"
          cat data/normalized/dataset_catalog.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload publishable data bundle
        uses: actions/upload-artifact@v4
        with:
          name: chile-hub-publishable-bundle
          path: |
            data/normalized/regiones.parquet
            data/normalized/provincias.parquet
            data/normalized/comunas.parquet
            data/normalized/indicadores.parquet
            data/normalized/regiones.json
            data/normalized/provincias.json
            data/normalized/comunas.json
            data/normalized/indicadores_hoy.json
            data/normalized/pipeline_metadata.json
            data/normalized/pipeline_status.md
            data/normalized/hub_health.json
            data/normalized/hub_health.md
            data/normalized/hub_status.json
            data/normalized/hub_bundle.json
            data/normalized/redistribution_report.json
            data/normalized/redistribution_report.md
            data/normalized/provenance_report.json
            data/normalized/provenance_report.md
            data/normalized/drift_report.json
            data/normalized/drift_report.md
            data/normalized/overview.json
            data/normalized/overview.md
            data/normalized/chile-hub-publishable-bundle.zip
            data/normalized/chile-hub-publishable-bundle.zip.sha256
            data/normalized/dataset_catalog.json
            data/normalized/dataset_catalog.md
            data/normalized/artifact_manifest.json
