name: TestPyPI Package Smoke

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-testpypi:
    name: Build, publish to TestPyPI, and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build package
        id: build-package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
          version="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Smoke test TestPyPI install
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install --upgrade pip
          .venv-smoke/bin/python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "chile-hub==${{ steps.build-package.outputs.version }}"
          .venv-smoke/bin/python -c "from chile_hub import ChileHub; print(ChileHub.__name__)"
          .venv-smoke/bin/chile-hub --help
