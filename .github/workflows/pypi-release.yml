name: PyPI Release

on:
  workflow_run:
    workflows: ["Pipeline Check"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: pypi-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release and publish
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install package build dependencies
        run: uv sync --extra dev

      - name: Add .venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Download verified pipeline data assets
        id: pipeline-assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf data/normalized
          mkdir -p data/normalized

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            run_id="${{ github.event.workflow_run.id }}"
          else
            # Find the last successful run of Pipeline Check on main branch
            run_id=$(gh run list --workflow "Pipeline Check" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' || true)
          fi

          if [[ -n "$run_id" ]]; then
            gh run download "$run_id" \
              --name "pipeline-output-$run_id" \
              --dir data/normalized
          else
            echo "Error: No verified pipeline data assets found."
            exit 1
          fi

          if [[ ! -f data/normalized/pipeline_artifact_provenance.json ]]; then
            echo "::notice::Pipeline artifact has no provenance manifest; release data assets will not be attached."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          provenance = json.loads(
              Path("data/normalized/pipeline_artifact_provenance.json").read_text(encoding="utf-8")
          )
          profile = provenance.get("verification_profile")
          require_live = provenance.get("require_live")
          source_event = provenance.get("source_run_event")

          if profile != "publication" or require_live is not True:
              print(
                  "::notice::Pipeline artifact is not publication-grade "
                  f"(profile={profile!r}, require_live={require_live!r}, event={source_event!r}); "
                  "release data assets will not be attached."
              )
              sys.exit(2)
          PY
          validation_status="$?"
          set -e

          case "$validation_status" in
            0)
              python scripts/verify_pipeline.py --require-live
              echo "ready=true" >> "$GITHUB_OUTPUT"
              ;;
            2)
              echo "ready=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              exit 1
              ;;
          esac

      - name: Python semantic release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          before="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          python -m semantic_release version --skip-build --no-commit --no-tag --no-push --no-vcs-release
          after="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"

          # Detect if this is a tagged release, a manual run, or version bumped by semantic-release
          has_matching_tag="$(git tag --points-at HEAD | grep -E "^v${after}$" || true)"

          if [[ "$before" != "$after" || -n "$has_matching_tag" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "$before" != "$after" ]]; then
              uv lock
              uv lock --locked
              python scripts/sync_release_artifact_version.py

              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add CHANGELOG.md pyproject.toml uv.lock data/normalized/ index.html app.js
              git commit -m "chore(release): ${after} [skip ci]"
              tag="v${after}"
              git tag "$tag"
              git push origin HEAD:main "$tag"

              if gh release view "$tag" >/dev/null 2>&1; then
                echo "Release $tag already exists"
              else
                gh release create "$tag" --notes "Release $tag"
              fi
            else
              uv lock --locked
            fi
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$after" >> "$GITHUB_OUTPUT"
          else
            git checkout -- CHANGELOG.md pyproject.toml uv.lock
            uv lock --locked
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "version=$after" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and check released package
        if: steps.semantic-release.outputs.released == 'true'
        run: |
          rm -rf dist/
          python -m build
          python -m twine check dist/*

      - name: Publish package to PyPI
        if: steps.semantic-release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.13.0
        with:
          skip-existing: true

      - name: Attach verified data assets to release
        if: steps.semantic-release.outputs.released == 'true' && steps.pipeline-assets.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.semantic-release.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
          else
            gh release create "$tag" --notes "Release $tag"
          fi
          gh release upload "$tag" \
            data/normalized/chile-hub-publishable-bundle.zip \
            data/normalized/chile-hub-publishable-bundle.zip.sha256 \
            data/normalized/artifact_manifest.json \
            data/normalized/dataset_catalog.json \
            data/normalized/hub_bundle.json \
            --clobber
