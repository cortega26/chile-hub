name: PyPI Release

on:
  workflow_run:
    workflows: ["Pipeline Check"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: pypi-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release and publish
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install package build dependencies
        run: uv sync --extra dev

      - name: Add .venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Download verified pipeline data assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf data/normalized
          mkdir -p data/normalized

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            run_id="${{ github.event.workflow_run.id }}"
          else
            # Find the last successful run of Pipeline Check on main branch
            run_id=$(gh run list --workflow "Pipeline Check" --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId' || true)
          fi

          if [[ -n "$run_id" ]]; then
            gh run download "$run_id" \
              --name "pipeline-output-$run_id" \
              --dir data/normalized
          else
            echo "Error: No verified pipeline data assets found."
            exit 1
          fi

      - name: Python semantic release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          before="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          python -m semantic_release version --skip-build
          after="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"

          # Detect if this is a tagged release, a manual run, or version bumped by semantic-release
          has_matching_tag="$(git tag --points-at HEAD | grep -E "^v${after}$" || true)"

          if [[ "$before" != "$after" || -n "$has_matching_tag" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$after" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "version=$after" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and check released package
        if: steps.semantic-release.outputs.released == 'true'
        run: |
          rm -rf dist/
          python -m build
          python -m twine check dist/*

      - name: Publish package to PyPI
        if: steps.semantic-release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.13.0
        with:
          skip-existing: true

      - name: Attach verified data assets to release
        if: steps.semantic-release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.semantic-release.outputs.version }}"
          gh release create "$tag" --notes "Release $tag" || true
          gh release upload "$tag" \
            data/normalized/chile-hub-publishable-bundle.zip \
            data/normalized/chile-hub-publishable-bundle.zip.sha256 \
            data/normalized/artifact_manifest.json \
            data/normalized/dataset_catalog.json \
            data/normalized/hub_bundle.json \
            --clobber
