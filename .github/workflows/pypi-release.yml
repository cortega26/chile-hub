name: PyPI Release

on:
  workflow_run:
    workflows: ["Pipeline Check"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: pypi-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release and publish
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            dev-requirements.txt

      - name: Install package build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "$(grep '^build==' dev-requirements.txt)" "$(grep '^twine==' dev-requirements.txt)"

      - name: Download verified pipeline data assets
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf data/normalized
          mkdir -p data/normalized
          gh run download "${{ github.event.workflow_run.id }}" \
            --name "pipeline-output-${{ github.event.workflow_run.id }}" \
            --dir data/normalized

      - name: Python semantic release
        id: semantic-release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build: "false"

      - name: Build and check released package
        if: steps.semantic-release.outputs.released == 'true'
        run: |
          rm -rf dist/
          python -m build
          python -m twine check dist/*

      - name: Publish package to PyPI
        if: steps.semantic-release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.13.0

      - name: Attach verified data assets to release
        if: steps.semantic-release.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.semantic-release.outputs.version }}"
          gh release upload "$tag" \
            data/normalized/chile-hub-publishable-bundle.zip \
            data/normalized/chile-hub-publishable-bundle.zip.sha256 \
            data/normalized/artifact_manifest.json \
            data/normalized/dataset_catalog.json \
            data/normalized/hub_bundle.json \
            --clobber
