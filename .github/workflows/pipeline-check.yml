name: Pipeline Check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # GitHub cron is UTC: 06:00 CLT or 07:00 CLST.
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish fresh live artifacts to main
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  PIPELINE_ARTIFACT: pipeline-output-${{ github.run_id }}

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

jobs:
  quality:
    name: Python quality
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Verify uv.lock is in sync with pyproject.toml
        run: uv lock --locked

      - name: Check Python lint
        run: uvx ruff@0.15.17 check src/ tests/ scripts/

      - name: Check Python format
        run: uvx ruff@0.15.17 format --check src/ tests/ scripts/

      - name: Check dataset registry/docs/contracts sync
        run: python scripts/check_companion_paths.py registry

      - name: Fetch PR base commit for companion-path diff
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"

      - name: Check companion paths (docs/tests co-change)
        if: github.event_name == 'pull_request'
        run: |
          python scripts/check_companion_paths.py companions \
            --base "${{ github.event.pull_request.base.sha }}"

  build-and-test:
    name: Build and verify data
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra pipeline --extra dev

      - name: Add .venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Install unrar
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          sudo apt-get update
          sudo apt-get install -y unrar

      - name: Set date key
        id: date-key
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: echo "stamp=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache staging data
        id: cache-staging
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            data/staging/
            data/raw/
          key: staging-data-${{ steps.date-key.outputs.stamp }}-${{ hashFiles('.github/workflows/pipeline-check.yml') }}
          restore-keys: |
            staging-data-${{ steps.date-key.outputs.stamp }}-
            staging-data-

      - name: Extract source data (conditional)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ steps.cache-staging.outputs.cache-hit }}" = "true" ]; then
            echo "Cache de staging encontrado. Ejecutando solo extractores de alta frecuencia..."
            python src/extractors/bcentral_extractor.py
            python src/extractors/res_extractor.py
            # Los demás extractores usan datos cacheados de data/staging/ y data/raw/
          else
            echo "Cache no encontrado. Ejecutando extracción completa..."
            python src/extractors/subdere_extractor.py
            python src/extractors/bcentral_extractor.py
            python src/extractors/censo_extractor.py
            python src/extractors/censo_hogares_viviendas_extractor.py
            python src/extractors/salud_extractor.py
            python src/extractors/electoral_extractor.py
            python src/extractors/mineduc_establecimientos_extractor.py
            python src/extractors/mineduc_resultados_extractor.py
            python src/extractors/siedu_extractor.py
            python src/extractors/res_extractor.py
            python src/extractors/pobreza_extractor.py
            python src/extractors/consumo_electrico_extractor.py
            python src/extractors/partidos_politicos_extractor.py
            python src/extractors/autoridades_electas_extractor.py
          fi

      - name: Restore versioned SINIM snapshot
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          # finanzas_municipales is monthly-cadence (see Monthly Scrape workflow),
          # not a daily extractor. Its staging snapshot is force-committed to git
          # by that workflow; make sure neither a stale actions/cache restore nor
          # a leftover fallback write can shadow the versioned copy here.
          git checkout -- data/staging/finanzas_municipales.csv data/staging/finanzas_municipales.metadata.json 2>/dev/null || true

      - name: Build outputs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python src/build_dev_db.py

      - name: Check build-synced files
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if ! git diff --quiet -- index.html app.js; then
            git diff -- index.html app.js
            echo "::error::Build-synced files are stale. Run python src/build_dev_db.py and commit index.html/app.js."
            exit 1
          fi

      - name: Verify pipeline artifacts
        id: verify-pipeline
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.publish }}" == "true" ]]; then
            profile=publication
          else
            profile=readiness
          fi
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          python scripts/verify_pipeline.py --profile "$profile"

      - name: Explain verification profile
        run: |
          if [[ "${{ steps.verify-pipeline.outputs.profile }}" == "publication" ]]; then
            {
              echo "## Verification profile"
              echo ""
              echo "Publication profile: live-source gates are enforced before artifacts can publish."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Verification profile"
              echo ""
              echo "Readiness profile: this run may pass with fallback or sample data."
              echo ""
              echo "These artifacts are suitable for CI smoke tests only. PyPI release asset upload requires a publication-profile artifact and a live-data verification guard."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write pipeline artifact provenance
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          profile = "${{ steps.verify-pipeline.outputs.profile }}"
          metadata = {
              "verification_profile": profile,
              "require_live": profile == "publication",
              "source_run_event": "${{ github.event_name }}",
              "source_run_id": "${{ github.run_id }}",
              "source_sha": "${{ github.sha }}",
              "source_ref": "${{ github.ref }}",
              "workflow": "${{ github.workflow }}",
              "publish_input": os.environ.get("PUBLISH_INPUT", "false").lower() == "true",
          }
          Path("data/normalized/pipeline_artifact_provenance.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
        env:
          PUBLISH_INPUT: ${{ inputs.publish || 'false' }}

      - name: Run unit and contract tests
        run: python -m pytest -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: false  # Deshabilitado: migrado a badge autogenerado (coverage_badge.json)
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage badge
        run: python scripts/generate_coverage_badge.py

      - name: Generate pipeline status
        run: python scripts/pipeline_status.py

      - name: Generate freshness badge
        run: python scripts/generate_freshness_badge.py

      - name: Publish job summary
        run: |
          for report in \
            overview.md \
            hub_health.md \
            redistribution_report.md \
            provenance_report.md \
            drift_report.md \
            pipeline_status.md \
            dataset_catalog.md
          do
            cat "data/normalized/$report" >> "$GITHUB_STEP_SUMMARY"
            printf "\n\n" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload generated pipeline output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.PIPELINE_ARTIFACT }}
          path: data/normalized/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  package-quality:
    name: Package quality (${{ matrix.python-version }})
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Build wheel and source distribution
        run: |
          uv build
          uvx twine check dist/*

      - name: Install wheel and smoke test CLI
        run: |
          uv pip install --system --force-reinstall dist/*.whl
          python -c "from chile_hub import ChileHub; print(ChileHub)"
          chile-hub --help
          chile-hub cache status

  landing:
    name: Landing smoke test
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Add .venv to PATH
        run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Cache Chromium
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Chromium system dependencies
        run: python -m playwright install --with-deps chromium

      - name: Download generated pipeline output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PIPELINE_ARTIFACT }}
          path: data/normalized/

      - name: Verify landing page
        run: python scripts/verify_landing.py

  publish:
    name: Publish verified data
    if: github.event_name == 'schedule' || inputs.publish == true
    needs: [build-and-test, landing]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Download verified pipeline output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PIPELINE_ARTIFACT }}
          path: data/normalized/

      - name: Commit refreshed artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all data/normalized/ index.html app.js
          if git diff --cached --quiet; then
            echo "No publishable data changes."
            exit 0
          fi
          git commit -m "chore(data): daily refresh [skip ci]"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
